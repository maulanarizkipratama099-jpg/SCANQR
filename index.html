<body>
    <!-- [HTML sama dengan sebelumnya - tidak diubah] -->
    <div id="toastContainer"></div>

    <!-- Load Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        // ==================== KONFIGURASI GOOGLE APPS SCRIPT ====================
        // Gunakan URL yang SAMA dengan aplikasi siswa
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhrMK7esCETPxnd1BOh9xq27q-mC0w2_YK3JXCTedbTpB5RmzxSFpAJYo06X1dUTA/exec";

        // Sheet names - SAMA dengan aplikasi siswa
        const SHEET_NAMES = {
            STUDENTS: "STUDENTS",
            ATTENDANCE: "ATTENDANCE",
            LOCATIONS: "LOCATIONS",
            CONFIG: "CONFIG"
        };

        // KONSTANTA LOKASI SEKOLAH
        const SCHOOL_LOCATION = {
            lat: -7.230636,
            lng: 112.749601,
            radius: 100,
            address: "Jl. Irawati 1 No. 15-17, Surabaya"
        };

        // STATE
        let html5QrcodeScanner = null;
        let isScanning = false;
        let students = [];
        let attendanceRecords = [];
        let locationRecords = [];
        let todayScans = [];
        let isLoading = false;
        let currentLocation = null;
        let watchId = null;
        let configData = { school_logo: '' };
        let autoResumeTimeout = null;
        let countdownInterval = null;
        let countdownSeconds = 3;
        let studentCache = new Map();

        // ==================== FUNGSI API GOOGLE APPS SCRIPT ====================
        async function fetchSheetData(sheetName) {
            return new Promise((resolve) => {
                const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
                
                window[callbackName] = function(response) {
                    console.log(`📥 Response diterima untuk ${sheetName}:`, response);
                    
                    const script = document.getElementById(callbackName);
                    if (script) script.remove();
                    
                    delete window[callbackName];
                    clearTimeout(timeout);
                    
                    if (response && response.success) {
                        resolve(response.data || []);
                    } else {
                        resolve([]);
                    }
                };

                const timeout = setTimeout(() => {
                    console.log(`⏱️ Timeout fetch ${sheetName}`);
                    if (window[callbackName]) {
                        delete window[callbackName];
                    }
                    const script = document.getElementById(callbackName);
                    if (script) script.remove();
                    resolve([]);
                }, 10000);

                const actionMap = {
                    'STUDENTS': 'getStudents',
                    'ATTENDANCE': 'getAttendance',
                    'LOCATIONS': 'getLocations',
                    'CONFIG': 'getConfig'
                };

                const action = actionMap[sheetName];
                if (!action) {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    resolve([]);
                    return;
                }

                const script = document.createElement('script');
                script.id = callbackName;
                script.src = `${APPS_SCRIPT_URL}?action=${action}&callback=${callbackName}&_=${Date.now()}`;
                
                script.onerror = () => {
                    console.error(`❌ Script error fetch ${sheetName}`);
                    clearTimeout(timeout);
                    if (window[callbackName]) {
                        delete window[callbackName];
                    }
                    script.remove();
                    resolve([]);
                };

                document.body.appendChild(script);
                console.log(`📤 Mengirim request ${sheetName} dengan callback ${callbackName}`);
            });
        }

        async function saveAttendance(newRecord) {
            try {
                showToast('Menyimpan ke server...', 'info', 5000);
                
                attendanceRecords.push(newRecord);
                
                // Kirim via JSONP
                return new Promise((resolve) => {
                    const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
                    
                    window[callbackName] = function(response) {
                        cleanup();
                        console.log(`📥 Response dari Apps Script untuk ATTENDANCE:`, response);
                        
                        if (response && response.success) {
                            console.log(`✅ ATTENDANCE saved to Google Sheets`);
                            updateRecentScans();
                            resolve(true);
                        } else {
                            console.error(`❌ Gagal simpan ATTENDANCE:`, response?.error);
                            attendanceRecords = attendanceRecords.filter(r => r.id !== newRecord.id);
                            resolve(false);
                        }
                    };

                    const timeout = setTimeout(() => {
                        cleanup();
                        console.log(`⏱️ Timeout update ATTENDANCE`);
                        attendanceRecords = attendanceRecords.filter(r => r.id !== newRecord.id);
                        resolve(false);
                    }, 15000);

                    function cleanup() {
                        delete window[callbackName];
                        clearTimeout(timeout);
                        const script = document.getElementById(callbackName);
                        if (script) script.remove();
                    }

                    // Konversi ke format array untuk sheet (HARUS SESUAI DENGAN HEADER)
                    const values = [[
                        newRecord.id,
                        newRecord.student_id,
                        newRecord.student_nis,
                        newRecord.student_nama,
                        newRecord.student_kelas,
                        newRecord.student_jurusan,
                        newRecord.student_photo,
                        newRecord.status,
                        newRecord.metode,
                        newRecord.location?.lat || '',
                        newRecord.location?.lng || '',
                        newRecord.location?.accuracy || '',
                        newRecord.keterangan || '',
                        newRecord.tanggal,
                        newRecord.timestamp
                    ]];

                    const formData = new FormData();
                    formData.append('action', 'saveAttendance');
                    formData.append('data', JSON.stringify(values));
                    formData.append('callback', callbackName);

                    fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'cors',
                        body: formData
                    })
                    .then(response => response.text())
                    .then(text => eval(text))
                    .catch(error => {
                        console.error(`❌ Fetch error for ATTENDANCE:`, error);
                        cleanup();
                        attendanceRecords = attendanceRecords.filter(r => r.id !== newRecord.id);
                        resolve(false);
                    });

                    console.log(`📤 Mengirim POST request ke Apps Script untuk ATTENDANCE`);
                });
                
            } catch (error) {
                console.error('❌ Gagal simpan absensi:', error);
                showToast('Gagal menyimpan ke server', 'error');
                return false;
            }
        }

        // ==================== FUNGSI LOAD DATA ====================
        async function loadStudents() {
            try {
                const rows = await fetchSheetData('STUDENTS');
                
                if (rows && rows.length > 1) {
                    const headers = rows[0];
                    students = [];
                    
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length === 0) continue;
                        
                        const student = {};
                        headers.forEach((header, index) => {
                            if (header && header.trim()) {
                                student[header.trim()] = row[index] || '';
                            }
                        });
                        students.push(student);
                    }
                    
                    // Update cache
                    studentCache.clear();
                    students.forEach(student => {
                        const nis = String(student.nis).trim();
                        studentCache.set(nis, student);
                        studentCache.set(nis.replace(/^0+/, ''), student);
                        
                        // JUGA CACHE BERDASARKAN ID (untuk QR yang mungkin pakai ID)
                        if (student.id) {
                            studentCache.set(student.id, student);
                        }
                    });
                }
                
                console.log('📚 Loaded students:', students.length);
                return students;
            } catch (error) {
                console.error('❌ Gagal load siswa:', error);
                showToast('Gagal memuat data siswa', 'error');
                return [];
            }
        }

        async function loadAttendance() {
            try {
                const rows = await fetchSheetData('ATTENDANCE');
                
                if (rows && rows.length > 1) {
                    const headers = rows[0];
                    attendanceRecords = [];
                    
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length === 0) continue;
                        
                        const record = {};
                        headers.forEach((header, index) => {
                            if (header && header.trim()) {
                                let value = row[index] || '';
                                
                                if (header === 'location_lat' || header === 'location_lng' || header === 'location_accuracy') {
                                    record[header] = parseFloat(value) || 0;
                                } else if (header === 'timestamp') {
                                    record[header] = parseInt(value) || 0;
                                } else {
                                    record[header] = value;
                                }
                            }
                        });
                        
                        // Parse location
                        if (record.location_lat && record.location_lng) {
                            record.location = {
                                lat: record.location_lat,
                                lng: record.location_lng,
                                accuracy: record.location_accuracy || 0,
                                timestamp: record.timestamp || Date.now()
                            };
                            delete record.location_lat;
                            delete record.location_lng;
                            delete record.location_accuracy;
                        }
                        
                        attendanceRecords.push(record);
                    }
                }
                
                console.log('📋 Loaded attendance:', attendanceRecords.length);
                updateRecentScans();
                
                return attendanceRecords;
            } catch (error) {
                console.error('❌ Gagal load absensi:', error);
                return [];
            }
        }

        async function loadLocationRecords() {
            try {
                const rows = await fetchSheetData('LOCATIONS');
                
                if (rows && rows.length > 1) {
                    const headers = rows[0];
                    locationRecords = [];
                    
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length === 0) continue;
                        
                        const record = {};
                        headers.forEach((header, index) => {
                            if (header && header.trim()) {
                                let value = row[index] || '';
                                if (header === 'lat' || header === 'lng' || header === 'accuracy') {
                                    record[header] = parseFloat(value) || 0;
                                } else if (header === 'timestamp') {
                                    record[header] = parseInt(value) || 0;
                                } else {
                                    record[header] = value;
                                }
                            }
                        });
                        locationRecords.push(record);
                    }
                }
                
                return locationRecords;
            } catch (error) {
                console.error('❌ Gagal load lokasi:', error);
                return [];
            }
        }

        async function loadConfig() {
            try {
                const data = await fetchSheetData('CONFIG');
                
                if (data && typeof data === 'object') {
                    configData = data;
                    
                    if (configData.school_logo) {
                        document.getElementById('openingLogoImage').src = configData.school_logo;
                        document.getElementById('openingLogoImage').classList.remove('hidden');
                        document.getElementById('openingLogoIcon').classList.add('hidden');
                    }
                }
                
                return configData;
            } catch (error) {
                console.error('❌ Gagal load config:', error);
                return {};
            }
        }

        // ==================== FUNGSI OPENING ====================
        async function loadOpeningLogo() {
            await loadConfig();
        }

        function closeOpening() {
            setTimeout(() => {
                document.getElementById('openingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('openingOverlay').style.display = 'none';
                    document.getElementById('loginContainer').classList.add('visible');
                }, 800);
            }, 2000);
        }

        // ==================== FUNGSI LOGIN ====================
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                showToast('Login berhasil!', 'success');
                
                document.getElementById('loginContainer').classList.remove('visible');
                document.getElementById('mainContainer').classList.add('visible');

        function handleLogout() {
            stopScanner();
            
            if (autoResumeTimeout) {
                clearTimeout(autoResumeTimeout);
                autoResumeTimeout = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            
            document.getElementById('mainContainer').classList.remove('visible');
            document.getElementById('loginContainer').classList.add('visible');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password').type = 'password';
            document.getElementById('togglePassword').classList.remove('fa-eye-slash');
            document.getElementById('togglePassword').classList.add('fa-eye');
            
            document.getElementById('locationStatus').classList.remove('visible');
            
            showToast('Berhasil logout', 'info');
        }

        // ==================== FUNGSI LOKASI ====================
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }

        function isWithinSchoolRadius(lat, lng) {
            if (!lat || !lng) return false;
            const distance = calculateDistance(lat, lng, SCHOOL_LOCATION.lat, SCHOOL_LOCATION.lng);
            return distance <= SCHOOL_LOCATION.radius;
        }

        function getLocationStatus(lat, lng) {
            if (!lat || !lng) return { valid: false, text: 'Lokasi tidak diketahui', class: '', distance: null };
            
            const distance = calculateDistance(lat, lng, SCHOOL_LOCATION.lat, SCHOOL_LOCATION.lng);
            const withinRadius = distance <= SCHOOL_LOCATION.radius;
            
            return {
                valid: withinRadius,
                text: withinRadius ? `✅ Dalam radius (${Math.round(distance)}m dari sekolah)` : `❌ Luar radius (${Math.round(distance)}m dari sekolah)`,
                class: withinRadius ? 'location-valid' : 'location-invalid',
                distance: Math.round(distance)
            };
        }

        function startLocationTracking() {
            if (!navigator.geolocation) {
                showToast('Browser tidak mendukung GPS', 'error');
                return;
            }

            const locationDiv = document.getElementById('locationStatus');
            const locationText = document.getElementById('locationText');
            const locationCoord = document.getElementById('locationCoord');
            const locationValidity = document.getElementById('locationValidity');

            locationDiv.classList.add('visible');
            locationText.textContent = 'Mendapatkan lokasi...';

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: position.timestamp
                    };

                    const status = getLocationStatus(currentLocation.lat, currentLocation.lng);
                    
                    locationText.textContent = `Lokasi: ${status.text}`;
                    locationCoord.innerHTML = `
                        <i class="fas fa-crosshairs mr-1"></i>${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)} 
                        <span class="text-xs ml-1">±${Math.round(currentLocation.accuracy)}m</span>
                    `;
                    locationValidity.innerHTML = `
                        <span class="location-badge ${status.class}">${status.text}</span>
                    `;

                    showToast('Lokasi terdeteksi', 'success');
                },
                (error) => {
                    console.error('Location error:', error);
                    let errorMsg = 'Gagal mendapatkan lokasi';
                    if (error.code === 1) errorMsg = 'Akses lokasi ditolak';
                    else if (error.code === 2) errorMsg = 'Lokasi tidak tersedia';
                    else if (error.code === 3) errorMsg = 'Timeout mendapatkan lokasi';
                    
                    locationText.textContent = errorMsg;
                    locationCoord.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Periksa pengaturan GPS';
                    showToast(errorMsg, 'error');
                },
                options
            );

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    currentLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: position.timestamp
                    };

                    const status = getLocationStatus(currentLocation.lat, currentLocation.lng);
                    
                    locationText.textContent = `Lokasi: ${status.text}`;
                    locationCoord.innerHTML = `
                        <i class="fas fa-crosshairs mr-1"></i>${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)} 
                        <span class="text-xs ml-1">±${Math.round(currentLocation.accuracy)}m</span>
                    `;
                    locationValidity.innerHTML = `
                        <span class="location-badge ${status.class}">${status.text}</span>
                    `;
                },
                (error) => {
                    console.error('Watch position error:', error);
                },
                options
            );
        }

        function stopLocationTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }

        // PERBAIKAN UTAMA: Fungsi pencarian siswa yang lebih fleksibel
        function findStudentByNIS(nisFromQR) {
            if (!students || students.length === 0) {
                console.log('⚠️ Data siswa kosong');
                return null;
            }
            
            const cleanInput = String(nisFromQR).trim();
            console.log('🔍 Mencari siswa dengan input:', cleanInput);
            
            // 1. Coba cari berdasarkan ID (format MASxxxxx)
            if (cleanInput.startsWith('MAS')) {
                const student = students.find(s => s.id === cleanInput);
                if (student) {
                    console.log('✅ Ditemukan berdasarkan ID:', student);
                    return student;
                }
            }
            
            // 2. Coba cari berdasarkan NIS (dengan cache)
            if (studentCache.has(cleanInput)) {
                return studentCache.get(cleanInput);
            }
            
            // 3. Coba tanpa leading zeros
            const withoutLeadingZeros = cleanInput.replace(/^0+/, '');
            if (studentCache.has(withoutLeadingZeros)) {
                return studentCache.get(withoutLeadingZeros);
            }
            
            // 4. Cari di array
            let student = students.find(s => String(s.nis).trim() === cleanInput);
            if (student) return student;
            
            student = students.find(s => String(s.nis).replace(/^0+/, '') === withoutLeadingZeros);
            if (student) return student;
            
            // 5. Coba 7 digit terakhir (untuk NIS panjang)
            const last7Digits = cleanInput.slice(-7);
            student = students.find(s => String(s.nis).endsWith(last7Digits) || String(s.nis).includes(last7Digits));
            
            if (student) {
                console.log('✅ Ditemukan berdasarkan 7 digit terakhir:', student);
                return student;
            }
            
            console.log('❌ Siswa tidak ditemukan');
            return null;
        }

        function generateId() {
            return 'QR' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5).toUpperCase();
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatTime(date) {
            return date.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function formatDateTime(timestamp) {
            return new Date(timestamp).toLocaleString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function updateRecentScans() {
            const today = formatDate(new Date());
            todayScans = attendanceRecords
                .filter(r => r.tanggal === today && r.metode === 'qr')
                .sort((a, b) => b.timestamp - a.timestamp)
                .slice(0, 5);
            
            const listEl = document.getElementById('recentList');
            const countEl = document.getElementById('scanCount');
            
            if (todayScans.length === 0) {
                listEl.innerHTML = '<div class="text-center text-gray-400 text-sm py-4"><i class="fas fa-camera text-3xl mb-2 opacity-50"></i><p>Belum ada scan hari ini</p></div>';
                countEl.textContent = '0 hari ini';
                return;
            }
            
            countEl.textContent = `${todayScans.length} hari ini`;
            
            listEl.innerHTML = todayScans.map(scan => {
                const waktu = new Date(scan.timestamp).toLocaleTimeString('id-ID', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const locationValid = scan.location && isWithinSchoolRadius(scan.location.lat, scan.location.lng);
                
                return `
                    <div class="scan-item">
                        <div>
                            <div class="font-bold text-sm">${scan.student_nama}</div>
                            <div class="text-xs text-gray-500">${scan.student_kelas} | ID: ${scan.id}</div>
                            ${scan.location ? `
                                <div class="text-xs ${locationValid ? 'text-green-600' : 'text-red-600'} font-semibold mt-1">
                                    <i class="fas fa-map-pin mr-1"></i>${locationValid ? 'Dalam radius' : 'Luar radius'}
                                </div>
                            ` : ''}
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold">${waktu}</div>
                            <span class="badge badge-success mt-1 inline-block">QR</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== FUNGSI SCANNER ====================
        async function onScanSuccess(decodedText) {
            if (isLoading) {
                showToast('Sedang memproses scan sebelumnya...', 'warning');
                return;
            }
            
            isLoading = true;
            
            if (html5QrcodeScanner && isScanning) {
                try {
                    await html5QrcodeScanner.pause();
                } catch (e) {
                    console.error('Pause scanner error:', e);
                }
            }
            
            try {
                const qrData = decodedText.trim();
                console.log('🔍 QR terdeteksi:', qrData);
                
                showToast('Memproses scan...', 'info');
                
                if (!currentLocation) {
                    showStatus(
                        'error',
                        '❌ Lokasi Tidak Ditemukan',
                        'Aktifkan GPS dan izinkan akses lokasi',
                        null,
                        qrData
                    );
                    showToast('Aktifkan GPS terlebih dahulu', 'error');
                    
                    scheduleScannerResume();
                    isLoading = false;
                    return;
                }
                
                const locationValid = isWithinSchoolRadius(currentLocation.lat, currentLocation.lng);
                const locationStatus = getLocationStatus(currentLocation.lat, currentLocation.lng);
                
                // Cari siswa berdasarkan QR (bisa NIS atau ID)
                const student = findStudentByNIS(qrData);
                
                if (!student) {
                    showStatus(
                        'error', 
                        '❌ Siswa Tidak Ditemukan', 
                        `Data "${qrData}" tidak terdaftar di sistem.`, 
                        null,
                        qrData,
                        currentLocation,
                        locationStatus
                    );
                    showToast('Siswa tidak ditemukan!', 'error');
                    
                    startCountdown();
                    isLoading = false;
                    return;
                }
                
                const today = formatDate(new Date());
                const alreadyAbsent = attendanceRecords.some(r => 
                    r.student_id === student.id && r.tanggal === today && r.status === 'hadir'
                );
                
                if (alreadyAbsent) {
                    showStatus(
                        'warning', 
                        '⚠️ Sudah Absen Hari Ini', 
                        `${student.nama} (ID: ${student.id}) sudah melakukan absensi hari ini.`, 
                        student,
                        qrData,
                        currentLocation,
                        locationStatus
                    );
                    showToast('Sudah absen hari ini', 'warning');
                    
                    startCountdown();
                    isLoading = false;
                    return;
                }
                
                const now = new Date();
                const attendanceId = generateId();
                const newAttendance = {
                    id: attendanceId,
                    student_id: student.id,
                    student_nis: student.nis,
                    student_nama: student.nama,
                    student_kelas: student.kelas,
                    student_jurusan: student.jurusan,
                    student_photo: student.photo || '',
                    status: 'hadir',
                    metode: 'qr',
                    location: {
                        lat: currentLocation.lat,
                        lng: currentLocation.lng,
                        accuracy: currentLocation.accuracy,
                        timestamp: currentLocation.timestamp
                    },
                    keterangan: `Absen via QR. Jarak: ${locationStatus.distance}m dari sekolah. Akurasi: ±${Math.round(currentLocation.accuracy)}m`,
                    tanggal: formatDate(now),
                    timestamp: now.getTime()
                };
                
                const saved = await saveAttendance(newAttendance);
                
                if (saved) {
                    // Simpan juga ke lokasi (opsional)
                    await fetch(`${APPS_SCRIPT_URL}?action=saveLocations&callback=callback`, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'saveLocations',
                            data: [[
                                generateId(),
                                attendanceId,
                                student.id,
                                student.nis,
                                student.nama,
                                currentLocation.lat,
                                currentLocation.lng,
                                currentLocation.accuracy,
                                locationValid,
                                locationStatus.distance,
                                now.getTime()
                            ]]
                        })
                    }).catch(() => {});
                    
                    let message = `Selamat datang, ${student.nama}`;
                    if (!locationValid) {
                        message = `Peringatan: Anda di luar radius sekolah (${locationStatus.distance}m)`;
                    }
                    
                    showStatus(
                        locationValid ? 'success' : 'warning',
                        locationValid ? '✅ Absensi Berhasil!' : '⚠️ Absensi Tercatat (Luar Radius)',
                        message,
                        student,
                        qrData,
                        currentLocation,
                        locationStatus
                    );
                    
                    showToast(locationValid ? 'Kehadiran tercatat!' : 'Absen tercatat (luar radius)', locationValid ? 'success' : 'warning');
                    
                    await loadAttendance();
                    
                    startCountdown();
                } else {
                    showStatus(
                        'error', 
                        '❌ Gagal Menyimpan', 
                        'Terjadi kesalahan server. Coba lagi.', 
                        student,
                        qrData,
                        currentLocation,
                        locationStatus
                    );
                    
                    startCountdown();
                }
                
            } catch (error) {
                console.error('Error processing scan:', error);
                showStatus('error', '❌ Error', 'Terjadi kesalahan sistem: ' + error.message, null, decodedText);
                showToast('Error: ' + error.message, 'error');
                
                startCountdown();
            } finally {
                isLoading = false;
            }
        }

        function startCountdown() {
            countdownSeconds = 3;
            const timerEl = document.getElementById('countdownTimer');
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                timerEl.innerHTML = `Kembali ke scanner dalam <strong>${countdownSeconds}</strong> detik`;
                
                if (countdownSeconds <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    resumeScanner();
                }
            }, 1000);
        }

        function skipCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            resumeScanner();
        }

        function scheduleScannerResume() {
            if (autoResumeTimeout) {
                clearTimeout(autoResumeTimeout);
            }
            
            autoResumeTimeout = setTimeout(() => {
                resumeScanner();
                autoResumeTimeout = null;
            }, 3000);
        }

        function resumeScanner() {
            if (html5QrcodeScanner && document.getElementById('mainContainer').classList.contains('visible')) {
                try {
                    html5QrcodeScanner.resume();
                    isScanning = true;
                    
                    document.getElementById('statusCard').style.display = 'none';
                    
                    document.querySelector('.scanner-container').style.display = 'block';
                    document.getElementById('recentScans').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    
                    showToast('Siap scan berikutnya', 'info');
                } catch (e) {
                    console.error('Resume scanner error:', e);
                }
            }
        }

        function onScanError(error) {}

        function showStatus(type, title, message, student, qrData, location, locationStatus) {
            const card = document.getElementById('statusCard');
            const icon = document.getElementById('statusIcon');
            const titleEl = document.getElementById('statusTitle');
            const messageEl = document.getElementById('statusMessage');
            const detailEl = document.getElementById('studentDetail');
            const miniMap = document.getElementById('miniMap');
            const timerEl = document.getElementById('countdownTimer');
            
            card.className = 'status-card ' + type;
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            icon.innerHTML = icons[type] || '❓';
            
            titleEl.textContent = title;
            messageEl.textContent = message;
            
            timerEl.innerHTML = 'Kembali ke scanner dalam <strong>3</strong> detik';
            
            if (student) {
                document.getElementById('detailId').textContent = student.id || '-';
                document.getElementById('detailNisQR').textContent = qrData || '-';
                document.getElementById('detailNisDB').textContent = student.nis;
                document.getElementById('detailNama').textContent = student.nama;
                document.getElementById('detailKelas').textContent = student.kelas;
                document.getElementById('detailJurusan').textContent = student.jurusan;
                document.getElementById('detailCreatedAt').textContent = student.created_at ? formatDateTime(parseInt(student.created_at)) : '-';
                
                if (location) {
                    document.getElementById('detailLokasi').innerHTML = `
                        ${location.lat.toFixed(6)}, ${location.lng.toFixed(6)}<br>
                        <span class="text-xs text-gray-500">Akurasi: ±${Math.round(location.accuracy)}m</span>
                    `;
                    document.getElementById('detailLokasiStatus').innerHTML = `
                        <span class="location-badge ${locationStatus.class}">${locationStatus.text}</span>
                    `;
                    
                    miniMap.classList.remove('hidden');
                    miniMap.innerHTML = `<iframe 
                        width="100%" 
                        height="150" 
                        frameborder="0" 
                        style="border:0; border-radius: 20px;" 
                        src="https://www.google.com/maps/embed/v1/view?key=AIzaSyDTKZRcAp-b7p0js0obNooW83DLFRXNl18&center=${location.lat},${location.lng}&zoom=15&maptype=roadmap"
                        allowfullscreen>
                    </iframe>`;
                } else {
                    document.getElementById('detailLokasi').textContent = '-';
                    document.getElementById('detailLokasiStatus').textContent = '-';
                    miniMap.classList.add('hidden');
                }
                
                document.getElementById('detailWaktu').textContent = formatTime(new Date());
                detailEl.style.display = 'block';
            } else {
                document.getElementById('detailId').textContent = '-';
                document.getElementById('detailNisQR').textContent = qrData || '-';
                document.getElementById('detailNisDB').textContent = '-';
                document.getElementById('detailNama').textContent = '-';
                document.getElementById('detailKelas').textContent = '-';
                document.getElementById('detailJurusan').textContent = '-';
                document.getElementById('detailCreatedAt').textContent = '-';
                document.getElementById('detailLokasi').textContent = '-';
                document.getElementById('detailLokasiStatus').textContent = '-';
                detailEl.style.display = 'block';
                miniMap.classList.add('hidden');
            }
            
            document.querySelector('.scanner-container').style.display = 'none';
            document.getElementById('recentScans').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'none';
            
            card.style.display = 'block';
        }

        function startScanner() {
            if (!html5QrcodeScanner) {
                initScanner();
            } else {
                try {
                    html5QrcodeScanner.render(onScanSuccess, onScanError);
                    isScanning = true;
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    
                    startLocationTracking();
                } catch (e) {
                    console.error('Start scanner error:', e);
                    showToast('Gagal memulai kamera', 'error');
                }
            }
        }

        function stopScanner() {
            if (autoResumeTimeout) {
                clearTimeout(autoResumeTimeout);
                autoResumeTimeout = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            
            if (html5QrcodeScanner && isScanning) {
                try {
                    html5QrcodeScanner.clear();
                    isScanning = false;
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    
                    stopLocationTracking();
                    document.getElementById('locationStatus').classList.remove('visible');
                } catch (e) {
                    console.error('Stop scanner error:', e);
                }
            }
        }

        function initScanner() {
            try {
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true,
                    showTorchButtonIfSupported: true,
                    showZoomSliderIfSupported: true,
                    defaultZoomValueIfSupported: 2
                };
                
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", config, false);
                html5QrcodeScanner.render(onScanSuccess, onScanError);
                isScanning = true;
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                
                startLocationTracking();
                
            } catch (error) {
                console.error('Init scanner error:', error);
                showToast('Gagal inisialisasi kamera', 'error');
            }
        }

        async function checkCameraAndStart() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('openingStatus').textContent = 'Memuat data siswa...';
                await loadStudents();
                
                document.getElementById('openingStatus').textContent = 'Memuat data absensi...';
                await loadAttendance();
                
                document.getElementById('openingStatus').textContent = 'Memuat data lokasi...';
                await loadLocationRecords();
                
                startScanner();
            } catch (err) {
                showToast('Izinkan akses kamera untuk memindai QR', 'error');
                console.error('Camera permission error:', err);
            }
        }

        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'} text-xl"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        async function init() {
            await loadOpeningLogo();
            
            document.getElementById('openingStatus').textContent = 'Memuat data siswa...';
            await loadStudents();
            
            document.getElementById('openingStatus').textContent = 'Memuat data absensi...';
            await loadAttendance();
            
            document.getElementById('openingStatus').textContent = 'Memuat data lokasi...';
            await loadLocationRecords();
            
            closeOpening();
            
            if (typeof Html5QrcodeScanner === 'undefined') {
                showToast('Library QR Code tidak tersedia', 'error');
                return;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
